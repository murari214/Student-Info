<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access | CUTM ERP Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){ emailjs.init("YOUR_PUBLIC_KEY"); })();
    </script>
    <style>
        :root {
            --midnight: #0a0e17;
            --surface: #121826;
            --gold: #c5a059;
            --gold-glow: rgba(197, 160, 89, 0.2);
            --text-gray: #94a3b8;
            --white: #ffffff;
            --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, var(--midnight) 0%, #0f1420 100%);
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            color: var(--white);
            overflow-x: hidden;
            animation: bgPulse 8s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { background: linear-gradient(135deg, var(--midnight) 0%, #0f1420 100%); }
            100% { background: linear-gradient(135deg, #0f1420 0%, var(--midnight) 100%); }
        }

        .auth-container {
            width: 100%; 
            max-width: 480px; 
            background: var(--surface); 
            padding: 50px 40px;
            border-radius: 20px; 
            border: 1px solid rgba(197, 160, 89, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(197, 160, 89, 0.1);
            position: relative;
            transition: var(--transition);
            animation: containerFloat 4s ease-in-out infinite;
            overflow: hidden;
        }

        .auth-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(197, 160, 89, 0.03) 0%, transparent 70%);
            animation: rotateGlow 20s linear infinite;
            pointer-events: none;
        }

        @keyframes containerFloat {
            0%, 100% { transform: translateY(0px) rotateX(0deg); }
            50% { transform: translateY(-8px) rotateX(1deg); }
        }

        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .header-area { 
            text-align: center; 
            margin-bottom: 40px;
            position: relative;
            z-index: 2;
        }
        
        .header-area h1 { 
            font-size: 28px; 
            letter-spacing: 4px; 
            color: var(--gold); 
            font-weight: 800;
            background: linear-gradient(45deg, var(--gold), #e2c28d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleGlow 3s ease-in-out infinite alternate;
            position: relative;
        }

        @keyframes titleGlow {
            0% { 
                text-shadow: 0 0 10px var(--gold-glow);
                transform: scale(1);
            }
            100% { 
                text-shadow: 0 0 25px var(--gold-glow), 0 0 40px var(--gold-glow);
                transform: scale(1.03);
            }
        }

        .header-area p { 
            font-size: 11px; 
            color: var(--text-gray); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-top: 8px;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        .form-group { 
            margin-bottom: 22px;
            position: relative;
            animation: slideInLeft 0.8s ease-out forwards;
        }

        .form-group:nth-child(1) { animation-delay: 0.4s; }
        .form-group:nth-child(2) { animation-delay: 0.6s; }

        @keyframes slideInLeft {
            from { 
                opacity: 0; 
                transform: translateX(-40px) scale(0.95); 
            }
            to { 
                opacity: 1; 
                transform: translateX(0) scale(1); 
            }
        }

        .form-group label { 
            display: block; 
            font-size: 11px; 
            color: var(--gold); 
            text-transform: uppercase; 
            margin-bottom: 10px; 
            font-weight: 600;
            animation: labelFloat 2s ease-in-out infinite alternate;
            letter-spacing: 1px;
        }

        @keyframes labelFloat {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-2px); }
        }
        
        input {
            width: 100%; 
            padding: 18px 16px; 
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 12px;
            color: var(--white); 
            font-size: 15px; 
            transition: var(--transition);
            position: relative;
            animation: inputRise 0.7s ease-out forwards;
        }

        input:nth-of-type(1) { animation-delay: 0.8s; }
        input:nth-of-type(2) { animation-delay: 1.0s; }

        @keyframes inputRise {
            from { 
                opacity: 0; 
                transform: translateY(20px) scale(0.95); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }

        input:focus { 
            outline: none; 
            border-color: var(--gold); 
            background: rgba(197, 160, 89, 0.08); 
            box-shadow: 0 0 20px var(--gold-glow);
            transform: scale(1.02);
        }

        input::placeholder {
            color: rgba(255,255,255,0.4);
            font-weight: 400;
        }

        .btn-auth {
            width: 100%; 
            padding: 18px; 
            background: linear-gradient(45deg, var(--gold), #e2c28d);
            color: var(--midnight);
            border: none; 
            border-radius: 12px; 
            font-weight: 700; 
            text-transform: uppercase;
            letter-spacing: 2px; 
            cursor: pointer; 
            transition: var(--transition); 
            margin-top: 12px;
            position: relative;
            overflow: hidden;
            font-size: 15px;
            animation: btnPulse 2.5s ease-in-out infinite;
        }

        @keyframes btnPulse {
            0%, 100% { box-shadow: 0 5px 15px rgba(197, 160, 89, 0.3); }
            50% { box-shadow: 0 5px 25px rgba(197, 160, 89, 0.5); }
        }

        .btn-auth::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s;
        }

        .btn-auth:hover::before { left: 100%; }
        .btn-auth:hover { 
            transform: translateY(-4px) scale(1.02); 
            box-shadow: 0 20px 40px rgba(197, 160, 89, 0.4);
        }

        .btn-auth:active {
            transform: translateY(-2px) scale(1);
        }

        /* Loading state */
        .btn-loading {
            pointer-events: none;
            position: relative;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(10, 14, 23, 0.3);
            border-radius: 50%;
            border-top-color: var(--midnight);
            animation: spin 1s ease-in-out infinite;
            margin-right: 12px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #dash-view { 
            display: none; 
            opacity: 0;
            transform: scale(0.9) translateY(30px);
            animation: dashboardSlideIn 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes dashboardSlideIn {
            to { 
                opacity: 1; 
                transform: scale(1) translateY(0); 
            }
        }

        .profile-header { 
            text-align: center; 
            margin-bottom: 35px;
            animation: profileFadeIn 1s ease-out 0.2s both;
        }

        @keyframes profileFadeIn {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-img {
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            border: 4px solid var(--gold);
            margin: 0 auto 18px; 
            padding: 6px; 
            background: var(--surface);
            object-fit: cover; 
            display: block; 
            box-shadow: 0 0 30px var(--gold-glow);
            transition: var(--transition);
            animation: avatarReveal 1.2s ease-out 0.4s both;
        }

        .profile-img:hover {
            transform: scale(1.05) rotate(5deg);
            box-shadow: 0 0 40px var(--gold-glow);
        }

        @keyframes avatarReveal {
            0% { 
                opacity: 0; 
                transform: scale(0) rotate(180deg); 
            }
            50% {
                transform: scale(1.1) rotate(0deg);
            }
            100% { 
                opacity: 1; 
                transform: scale(1) rotate(0deg); 
            }
        }

        .info-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 14px;
            margin-bottom: 25px;
        }

        .info-item { 
            background: rgba(255,255,255,0.03); 
            padding: 16px 20px; 
            border-radius: 14px; 
            border: 1px solid rgba(255,255,255,0.06);
            transform: translateX(-30px);
            opacity: 0;
            animation: infoSlideIn 0.6s ease-out forwards;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .info-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            transform: scaleX(0);
            transition: transform 0.5s ease-out;
        }

        .info-item:hover::before {
            transform: scaleX(1);
        }

        .info-item:nth-child(1) { animation-delay: 0.9s; }
        .info-item:nth-child(2) { animation-delay: 1.1s; }
        .info-item:nth-child(3) { animation-delay: 1.3s; }

        @keyframes infoSlideIn {
            to { 
                opacity: 1; 
                transform: translateX(0); 
            }
        }

        .info-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .info-item label { 
            font-size: 10px; 
            color: var(--gold); 
            text-transform: uppercase; 
            font-weight: 700; 
            letter-spacing: 1.2px;
            display: block;
            margin-bottom: 6px;
        }
        .info-item p { 
            font-size: 14px; 
            color: var(--white); 
            margin: 0;
            word-break: break-all;
        }

        #error-msg { 
            color: #ff4d4d; 
            font-size: 13px; 
            margin-top: 15px; 
            display: none; 
            text-align: center;
            animation: errorShake 0.6s ease-in-out;
            padding: 12px;
            background: rgba(255, 77, 77, 0.1);
            border: 1px solid rgba(255, 77, 77, 0.3);
            border-radius: 8px;
        }

        @keyframes errorShake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(-6px) rotate(-1deg); }
            75% { transform: translateX(6px) rotate(1deg); }
        }

        .hidden { display: none !important; }

        .logout-link { 
            display: inline-block; 
            margin-top: 25px; 
            font-size: 12px; 
            color: var(--text-gray); 
            cursor: pointer; 
            text-decoration: none;
            border-bottom: 1px solid transparent;
            padding: 8px 16px;
            border-radius: 20px;
            transition: var(--transition);
            animation: fadeInUp 1s ease-out 1.5s both;
            position: relative;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logout-link:hover { 
            color: var(--gold); 
            border-bottom-color: var(--gold);
            background: rgba(197, 160, 89, 0.1);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="auth-container" id="main-container">
        <div id="login-view">
            <div class="header-area">
                <h1>CUTM <span>ERP</span></h1>
                <p>Unified Secure Authentication</p>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label>Registration Number</label>
                    <input type="text" id="regNo" placeholder="e.g. 241107140001" required>
                </div>
                <div class="form-group">
                    <label>Security Key</label>
                    <input type="password" id="secret" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-auth" id="btn-text">Authenticate</button>
                <p id="error-msg">Access Denied: Record not found</p>
            </form>
        </div>

        <div id="dash-view">
            <div class="profile-header">
                <img id="u-pic" src="" alt="Profile" class="profile-img" onerror="this.src='https://ui-avatars.com/api/?background=c5a059&color=0a0e17&name=Student'">
                <h2 id="u-name" style="color: var(--gold);">Student Name</h2>
                <p id="u-dept-yr" style="font-size: 11px; color: var(--text-gray); letter-spacing: 1px; margin-top: 5px;">-</p>
            </div>

            <div class="info-grid">
                <div class="info-item"><label>Registration ID</label><p id="d-id">-</p></div>
                <div class="info-item"><label>Mobile Number</label><p id="d-tel">-</p></div>
                <div class="info-item"><label>Institutional Email</label><p id="d-mail">-</p></div>
            </div>

            <div style="text-align: center;">
                <a onclick="location.reload()" class="logout-link">↩ Secure Sign Out</a>
            </div>
        </div>
    </div>

        document.getElementById('login-form').addEventListener('submit', function(e) {

                    // Resize container smoothly
                    document.getElementById('main-container').style.maxWidth = "550px";
                    
                } else {
                    // Reset button and show error
                    btn.classList.remove('btn-loading');
                    btn.innerHTML = 'Authenticate';
                    errorMsg.style.display = 'block';
                    setTimeout(() => {
                        errorMsg.style.display = 'none';
                    }, 4000);
                }
            }, 1600);
        });
    </script>
</body>
</html>
